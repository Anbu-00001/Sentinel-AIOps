services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentinel-net

  dashboard:
    ports: []
    volumes:
      - sentinel_data:/app/data

  mcp-server:
    ports: []
    volumes:
      - sentinel_data:/app/data

  stream-simulator:
    profiles: ["dev"]

volumes:
  sentinel_data:
