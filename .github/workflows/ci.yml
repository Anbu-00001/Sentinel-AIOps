name: CI — Sentinel-AIOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PEP8 (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 models/ mcp-server/ scripts/stream_simulator.py dashboard/ database/ tests/ \
            --max-line-length 120 \
            --extend-ignore E501,W503,E402 \
            --count --statistics

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn lightgbm joblib \
                      prometheus_client pydantic mcp pytest \
                      sqlalchemy httpx fastapi uvicorn httpx



      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short
