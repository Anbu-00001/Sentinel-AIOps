name: CI — Sentinel-AIOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PEP8 (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 models/ mcp_server/ scripts/stream_simulator.py dashboard/ database/ tests/ \
            --max-line-length 120 \
            --extend-ignore E501,W503,E402 \
            --count --statistics

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      TESTING: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn lightgbm joblib \
                      prometheus_client pydantic mcp pytest \
                      sqlalchemy httpx fastapi uvicorn python-multipart



      - name: Verify environment configuration
        run: |
          python -c "
          import os;
          missing = [v for v in ['MODEL_SIGNATURE_SECRET'] if not os.getenv(v)];
          [print(f'WARNING: {v} not set in CI') for v in missing] if missing else print('All required CI secrets are present.')
          "
        env:
          MODEL_SIGNATURE_SECRET: ${{ secrets.MODEL_SIGNATURE_SECRET }}

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  lint-quality:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 models/ mcp_server/ dashboard/ database/ \
            tests/ scripts/ config.py \
            --max-line-length 120 \
            --extend-ignore E501,W503,E402 \
            --count --statistics
