
services:
  # ── MCP Inference Server ───────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-mcp
    ports:
      - "9090:9090"   # Prometheus /metrics
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SENTINEL_DB_PATH=/app/data/sentinel.db
      - MODEL_SIGNATURE_SECRET=${MODEL_SIGNATURE_SECRET}
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Observability Dashboard + Webhook Receiver ─────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: sentinel-dashboard
    # workers=1 for SQLite safety (no concurrent writers)
    command: ["python3", "-m", "uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8200", "--workers", "1"]
    ports:
      - "8200:8200"   # Dashboard UI + API + Webhook
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SENTINEL_DB_PATH=/app/data/sentinel.db
      - MODEL_SIGNATURE_SECRET=${MODEL_SIGNATURE_SECRET}
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Stream Simulator (Chaos Engineering Log Generator) ─────────────────────
  stream-simulator:
    build:
      context: .
      dockerfile: Dockerfile.dashboard   # reuses same image — has all deps
    container_name: sentinel-stream
    command: ["python3", "-m", "uvicorn", "scripts.stream_simulator:app", "--host", "0.0.0.0", "--port", "8100", "--workers", "1"]
    ports:
      - "8100:8100"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SENTINEL_DB_PATH=/app/data/sentinel.db
      - MODEL_SIGNATURE_SECRET=${MODEL_SIGNATURE_SECRET}
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - sentinel-net
    restart: unless-stopped

networks:
  sentinel-net:
    driver: bridge
