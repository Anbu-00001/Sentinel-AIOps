version: "3.9"

services:
  # ── MCP Inference Server ───────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-mcp
    ports:
      - "9090:9090"   # Prometheus /metrics
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SENTINEL_DB_PATH=/app/data/sentinel.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Observability Dashboard + Webhook Receiver ─────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    command: ["python3", "-m", "uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8200", "--workers", "4"]
    ports:
      - "8200:8200"   # Dashboard UI + API + Webhook
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SENTINEL_DB_PATH=/app/data/sentinel.db
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sentinel-data:
