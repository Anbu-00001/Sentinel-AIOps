version: "3.9"

services:
  # ── MCP Inference Server ───────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-mcp
    ports:
      - "9090:9090"   # Prometheus /metrics
    volumes:
      - ./models:/app/models:ro
      - ./data/feedback:/app/data/feedback
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Stream Simulator ───────────────────────────────────────────────────────
  stream-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-stream
    command: ["python", "data/stream_simulator.py"]
    ports:
      - "8100:8100"   # FastAPI stream endpoints
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Observability Dashboard ────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    command: ["python", "dashboard/app.py"]
    ports:
      - "8200:8200"   # Dashboard UI + API
    volumes:
      - ./models:/app/models:ro
      - ./data/feedback:/app/data/feedback:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  model-data:
  feedback-data:
